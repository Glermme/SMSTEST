<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <style>
    :root {
      color-scheme: light;
      --bg1: #0f172a;
      --bg2: #1e1b4b;
      --card: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.18);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --input-bg: rgba(255, 255, 255, 0.9);
      --input-text: #0f172a;
      --button: #7c3aed;
      --button-hover: #6d28d9;
      --success-bg: rgba(34, 197, 94, 0.15);
      --success-border: rgba(34, 197, 94, 0.4);
      --error-bg: rgba(239, 68, 68, 0.15);
      --error-border: rgba(239, 68, 68, 0.4);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.35), transparent 30%),
        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.28), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      line-height: 1.1;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 6px;
      color: var(--text);
    }

    input, textarea {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font: inherit;
      background: var(--input-bg);
      color: var(--input-text);
      outline: none;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      margin-top: 4px;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: var(--button);
      color: white;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover { background: var(--button-hover); }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      display: none;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      line-height: 1.5;
    }

    .status.show { display: block; }
    .status.success {
      background: var(--success-bg);
      border: 1px solid var(--success-border);
    }
    .status.error {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
    }

    .small {
      margin-top: 14px;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Contact Us</h1>
      <p>Fill out the form below and we will receive your submission, save it to Supabase, and send text messages to both you and the business owner.</p>

      <form id="contactForm">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required />
        </div>

        <div>
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" placeholder="+1234567890" required />
        </div>

        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" />
        </div>

        <div>
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="How can we help?"></textarea>
        </div>

        <button id="submitButton" type="submit">Send Form</button>
      </form>

      <div id="status" class="status" role="status" aria-live="polite"></div>

      <div class="small">
        This form submits to the same Vercel deployment root URL.
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const statusBox = document.getElementById('status');
    const submitButton = document.getElementById('submitButton');

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`;
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      submitButton.disabled = true;
      submitButton.textContent = 'Sending...';
      statusBox.className = 'status';
      statusBox.textContent = '';

      const payload = Object.fromEntries(new FormData(form).entries());

      try {
        const response = await fetch('/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!response.ok || !result.success) {
          throw new Error(result.error || 'Form submission failed.');
        }

        showStatus('Thanks. Your form was submitted successfully and a confirmation text should arrive shortly.', 'success');
        form.reset();
      } catch (error) {
        showStatus(error.message || 'Something went wrong. Please try again.', 'error');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Send Form';
      }
    });
  </script>
</body>
</html>
